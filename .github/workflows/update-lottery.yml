name: Update lottery data

on:
  schedule:
    # 23:59 Asia/Bangkok (UTC+7) every day. The draw lands on the 1st and 16th;
    # update_data.py is a no-op on days when GLO has nothing newer, which also
    # covers "retry the next day at the same time" when results are delayed.
    - cron: '59 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest draw from GLO
        run: python3 update_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No new draw — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add draws.json index.html
          git commit -m "Update lottery data ($(date +%Y-%m-%d))"
          git push
